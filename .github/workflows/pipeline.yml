name: 🔐 Pipeline DevSecOps

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    name: Build, Segurança e Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ✅ PASSO 1: Já está pronto — Baixar o código
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      # ✅ PASSO 2: Já está pronto — Build
      - name: ⚙️ Build
        run: |
          echo "Verificando arquivos..."
          ls src/
          echo "Build OK!"

      # ❌ PASSO 3: IMPLEMENTE AQUI — Secrets Scanning com Gitleaks
      # Dica: use a action oficial "gitleaks/gitleaks-action@v2"
      - name: 🔑 Secrets Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          

      # ✅ PASSO 4: SAST com Semgrep
      - name: 🔍 SAST - Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config auto --error src/
        

      # ❌ PASSO 5: IMPLEMENTE AQUI — SCA com Grype
      # Dica: instale com "curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin"
      # e rode "grype dir:. --fail-on medium"
      - name: 📦 SCA - Grype§
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype dir:. --fail-on medium

      # ✅ PASSO 6: Já está pronto — Deploy (só roda se tudo passar)
      - name: 🌐 Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload para Produção
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: 🚀 Deploy em Produção
        id: deployment
        uses: actions/deploy-pages@v4
